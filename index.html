<!DOCTYPE html>
<html lang="en">

<head>
    <title>ARIZE | Home</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="manifest" href="/assets/site.webmanifest">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon_io/site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            /* --day-bg: url('./assets/renders/day.jpg');
            --night-bg: url('./assets/renders/night.jpg'); */
            /* Arize Theme Colors */
            --arize-purple: #d5a758;
            --arize-yellow: #d5a758;
            --button-color: var(--arize-purple);
            --button-text: #000000;
        }

        #day-slide {
            background-image: url('./assets/renders/day.jpg');
        }

        #night-slide {
            background-image: url('./assets/renders/night.jpg');
        }

        /* Updated Global Button Styles */
        .tour-btn,
        .utility-btn,
        .vr-btn,
        .amenities-btn,
        .floor-plans-btn {
            background: var(--button-color) !important;
            color: var(--button-text) !important;
            border: 2px solid #000 !important;
            /* Matches the logo outline */
            font-weight: 700 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Use Yellow for the BhK buttons to differentiate */
        .button-group .tour-btn {
            background: var(--arize-yellow) !important;
        }

        /* Hover Effects */
        .tour-btn:hover,
        .utility-btn:hover,
        .vr-btn:hover,
        .amenities-btn:hover,
        .floor-plans-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 4px 4px 0px #000;
            /* Pop-art shadow style */
            background: #ffffff !important;
        }

        /* Utility buttons (home/expand/audio) update */
        .utility-btn {
            background: var(--arize-purple) !important;
        }

        /* Day/Night Toggle update */
        .day-night-toggle input[type="checkbox"] {
            background: var(--arize-purple);
            border: 2px solid #000;
        }

        .day-night-toggle input[type="checkbox"]:checked {
            background: var(--arize-yellow);
        }

        .day-night-toggle label {
            font-weight: 800;
            text-shadow: 1px 1px 0 #000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Update the body to remove the background image from here */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            /* Fallback */
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            transition: opacity 0.8s ease-in-out;
            z-index: 0;
        }

        /* Day image */
        .day-bg {
            background-image: url('./assets/renders/day.jpg');
            opacity: 1;
        }

        /* Night image */
        .night-bg {
            background-image: url('./assets/renders/night.jpg');
            opacity: 0;
        }

        /* When NIGHT is active */
        body.night-active .day-bg {
            opacity: 0;
        }

        body.night-active .night-bg {
            opacity: 1;
        }

        /* ONLY FOR LANDSCAPE: Show full image without cutting top/bottom */
        @media (orientation: landscape) {
            .bg-slide {
                background-size: contain;
            }
        }

        #page-content {
            position: relative;
            z-index: 10;
            /* Ensure UI stays on top of the images */
            width: 100%;
            height: 100%;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 20px;
            z-index: 20;
        }

        .logo-left,
        .logo-right {
            /* 🔥 KEY: same height = perfect alignment */
            object-fit: contain;
        }

        .logo-left {
            height: 50px;
        }

        .logo-right {
            height: 80px;
        }

        /* Right-side flat buttons (3BHK / 4BHK) */
        .button-group {
            right: 5%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: flex-end;
            z-index: 3;
        }

        .left-button-group,
        .button-group {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .tour-btn {
            min-width: 140px;
            height: 60px;
            border-radius: 40px;
            border: none;
            background: var(--button-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
            padding: 0 20px;
        }

        .tour-btn:hover {
            background: #c00064;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .tour-btn i {
            font-size: 1.4rem;
        }

        /* Floating circular utility buttons (bottom-right) */
        .utility-buttons {
            position: fixed;
            bottom: 1px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 9999;
        }

        .utility-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: var(--button-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
            position: relative;
            bottom: 12px;
        }

        .utility-btn:hover {
            background: #c00064;
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Left-center VR & Amenities buttons */
        .left-button-group {
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 4;
        }

        .vr-btn,
        .amenities-btn,
        .floor-plans-btn {
            min-width: 180px;
            height: 55px;
            padding: 0 15px;
            border-radius: 30px;
            border: none;
            background: var(--button-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
        }

        .btn-text {
            /* opacity: 0; */
            /* transition: opacity 0.3s ease; */
            font-weight: 700;
            text-transform: uppercase;
            pointer-events: none;
            margin-left: 3px;
            /* Space between icon and text */
            white-space: nowrap;
        }

        /* Ensure expansion reveals text in Landscape/Desktop */
        .vr-btn:hover .btn-text,
        .amenities-btn:hover .btn-text,
        .floor-plans-btn:hover .btn-text {
            opacity: 1 !important;
        }

        .vr-btn:hover,
        .amenities-btn:hover,
        .floor-plans-btn:hover {
            background: #c00064;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* UPDATED: Moves the day/night toggle to the bottom left */
        .day-night-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 4;
        }

        .day-night-toggle label {
            color: white;
            font-size: 20px;
            transition: color 0.3s;
        }

        .day-night-toggle input[type="checkbox"] {
            appearance: none;
            width: 40px;
            height: 20px;
            background: #ddd;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            outline: none;
        }

        .day-night-toggle input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #333;
            border-radius: 50%;
            top: 1px;
            left: 1px;
            transition: all 0.3s ease;
        }

        .day-night-toggle input[type="checkbox"]:checked::before {
            left: 21px;
            background: #fff;
        }

        /* Fullscreen Modal & Slider - Arize Theme */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            /* Above everything */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .slider-container {
            position: relative;
            width: 85%;
            height: 85%;
            border: 3px solid var(--arize-purple);
            background: #111;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(166, 140, 198, 0.3);
            overflow: hidden;
        }

        .slider {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-image {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes slideFade {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: 50px;
            height: 50px;
            background: var(--arize-yellow);
            color: #000;
            border: 2px solid #000;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transform: translateY(-50%);
            z-index: 10;
            transition: all 0.2s;
        }

        .prev {
            left: 20px;
            border-radius: 10px 0 0 10px;
        }

        .next {
            right: 20px;
            border-radius: 0 10px 10px 0;
        }

        .prev:hover,
        .next:hover {
            background: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: var(--arize-yellow);
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2001;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* Mobile styles */
        /* REPLACE the content of @media (max-width: 768px) with this: */
        @media (max-width: 768px) {
            .bg-layer {
                background-size: cover;
                background-position: center top; /* 🔥 THIS FIXES YOUR ISSUE */
            }

            .logo-below {
                /* Increased for Portrait visibility */
                width: 130px;
                top: 15px;
                z-index: 100;
                /* Ensures it stays above all other UI elements */
            }

            .logo-below {
                right: 15px;
                /* Keeps it snug in the top-right corner */
            }

            /* Left Group: Horizontal at the bottom center */
            /* Left side buttons on mobile */
            .left-button-group {
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                flex-direction: column;
                bottom: auto;
                /* Reset the bottom value */
                gap: 10px;
            }

            /* Right side buttons on mobile */
            .button-group {
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                gap: 10px;
            }

            /* Common sizing for all side buttons on mobile */
            /* Update base styles to support expansion */
            .vr-btn,
            .amenities-btn,
            .floor-plans-btn {
                min-width: 60px;
                /* Base contracted width (Circle-ish) */
                width: 45px;
                height: 45px;
                padding: 0;
                border-radius: 40px;
                border: 2px solid #000 !important;
                background: var(--button-color) !important;
                color: var(--button-text) !important;
                display: flex;
                align-items: center;
                justify-content: flex-start;
                /* Align icon to left */
                overflow: hidden;
                /* Hides text when contracted */
                cursor: pointer;
                box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
                transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
                white-space: nowrap;
            }

            /* Position icons centered in the contracted state */
            .vr-btn i,
            .amenities-btn i,
            .floor-plans-btn i {
                min-width: 60px;
                text-align: center;
                font-size: 1.2rem;
            }

            /* Expansion Logic */
            .vr-btn:hover,
            .amenities-btn:hover,
            .floor-plans-btn:hover {
                width: 200px;
                /* Expands to show full name */
                background: #ffffff !important;
                box-shadow: 4px 4px 0px #000;
            }

            /* Ensure text is hidden until expansion */
            .btn-text {
                opacity: 0;
                font-size: medium;
                transition: opacity 0.3s;
                font-weight: 700;
                text-transform: uppercase;
            }

            .vr-btn:hover .btn-text,
            .amenities-btn:hover .btn-text,
            .floor-plans-btn:hover .btn-text {
                opacity: 1;
            }

            /* Hide text on mobile to prevent clutter, show icons only */
            /* .btn-text,
            .tour-btn span {
                display: none;
            } */

            .tour-btn {
                min-width: 80px;
                height: 40px;
                font-size: 0.75rem;
                border-radius: 20px;
                box-shadow: 2px 2px 0px #000;
            }

            /* Day/Night Toggle: Bottom Center */
            .day-night-toggle {
                left: 15px;
                /* Align to the left */
                bottom: 20px;
                /* Snug at the bottom */
                transform: none;
                /* Remove the centering transform */
                background: rgba(0, 0, 0, 0.6);
                /* Slightly darker for better visibility */
                padding: 6px 12px;
                border-radius: 30px;
                border: 2px solid #000;
                /* Matching logo outline theme */
                z-index: 100;
            }

            .day-night-toggle label {
                font-size: 12px;
                /* Smaller text to fit better */
                letter-spacing: 1px;
            }

            /* Utility Buttons: Very Bottom Right */
            .utility-buttons {
                right: 10px;
                bottom: 10px;
                gap: 8px;
            }

            .utility-btn {
                width: 35px;
                height: 35px;
                font-size: 1rem;
                box-shadow: 2px 2px 0px #000;
            }
        }

        @media (max-width: 1000px) and (min-width: 769px) {
            .logo-left {
                width: 90px;
            }

            .logo-below {
                width: 120px;
                top: 15px;
                right: 15px;
            }

            .button-group {
                top: 50%;
                right: 3%;
                transform: translateY(-50%);
                align-items: flex-end;
                gap: 8px;
            }

            .tour-btn {
                min-width: 65px;
                height: 28px;
                font-size: 0.7rem;
                border-radius: 14px;
                padding: 0 8px;
                gap: 4px;
            }

            .tour-btn i {
                font-size: 0.8rem;
            }

            .utility-btn {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }

            .left-button-group {
                position: absolute;
                top: 40%;
                /* Matches the right side buttons */
                left: 5%;
                /* Matches the right side gap */
                display: flex;
                flex-direction: column;
                gap: 25px;
                /* Matches the button-group gap */
                align-items: flex-start;
                /* Aligns items to the left */
                z-index: 4;
            }

            .vr-btn,
            .amenities-btn,
            .floor-plans-btn {
                min-width: 140px;
                /* Matches BhK button width */
                height: 60px;
                /* Matches BhK button height */
                padding: 0 20px;
                border-radius: 40px;
                border: 2px solid #000 !important;
                background: var(--button-color) !important;
                color: var(--button-text) !important;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                font-size: 1.1rem;
                font-weight: 700;
                cursor: pointer;
                box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
                transition: all 0.3s ease-in-out;
            }

            .btn-text {
                font-size: 0.6rem;
            }

            .utility-buttons {
                bottom: calc(12px + env(safe-area-inset-bottom));
                right: 8px;
                gap: 4px;
            }

            .day-night-toggle {
                bottom: 12px;
                left: 8px;
            }

            .day-night-toggle label {
                font-size: 12px;
            }

            .day-night-toggle input[type="checkbox"] {
                width: 25px;
                height: 12px;
            }

            .day-night-toggle input[type="checkbox"]::before {
                width: 10px;
                height: 10px;
            }

            .day-night-toggle input[type="checkbox"]:checked::before {
                left: 14px;
            }
        }

        /* Rotate Overlay */
        #rotateOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.95);
            color: white;

            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;

            font-family: 'Segoe UI', sans-serif;
            font-size: 1.5rem;

            z-index: 999999;
            text-align: center;
            padding: 20px;
        }

        #rotateOverlay i {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: rotatePhone 2s infinite ease-in-out;
        }

        /* Portrait hint animation */
        @keyframes rotatePhone {
            0% {
                transform: rotate(90deg);
            }

            50% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(90deg);
            }
        }

        .bg-layer {
            background-position: center center;
            transition: opacity 0.8s ease-in-out, transform 1s ease;
        }

        body.night-active .night-bg {
            transform: scale(1.02);
            /* slight zoom */
        }
    </style>
</head>

<body>
    <div id="rotateOverlay">
        <i class="fa-solid fa-mobile-screen-button"></i>
        <p>Please rotate your device to portrait mode<br>for the best experience</p>
    </div>

    <div class="bg-layer day-bg"></div>
    <div class="bg-layer night-bg"></div>

    <div id="page-content">
        <audio id="background-audio" loop muted>
            <source src="./assets/audio/audio.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="top-bar">
            <img src="./assets/logos/arize-buildtech.png" class="logo-left">
            <img src="./assets/logos/Arize-02.png" class="logo-right">
        </div>

        <div class="left-button-group">
            <button class="vr-btn" onclick="location.href='./project/project.html'">
                <i class="fa-solid fa-location-dot"></i>
                <span class="btn-text">Landmarks</span>
            </button>
            <button class="amenities-btn" onclick="location.href='./lobby/lobby.html'">
                <i class="fa-solid fa-spa"></i>
                <span class="btn-text">Amenities</span>
            </button>
            <button class="floor-plans-btn" onclick="openModal()">
                <i class="fa-solid fa-map-location-dot"></i>
                <span class="btn-text">Floor Plans</span>
            </button>
        </div>

        <div class="button-group">
            <button class="tour-btn" onclick="location.href='./1bhk/1bhk.html'">
                <i class="fa-solid fa-building"></i> 1 BhK
            </button>
            <button class="tour-btn" onclick="location.href='./2bhk/2bhk.html'">
                <i class="fa-solid fa-building"></i> 2 BhK
            </button>
        </div>

        <div class="utility-buttons">
            <button class="utility-btn" onclick="location.href='./index.html'">
                <i class="fa-solid fa-house"></i>
            </button>
            <button class="utility-btn" onclick="toggleFullscreen()">
                <i class="fa-solid fa-expand"></i>
            </button>
            <button class="utility-btn" id="audioBtn" onclick="toggleAudio()">
                <i class="fa-solid fa-volume-xmark"></i>
            </button>
        </div>

        <div class="day-night-toggle">
            <label id="themeLabel" for="toggleTheme">NIGHT</label>
            <input type="checkbox" id="toggleTheme" checked />
        </div>
    </div>

    <div id="floorPlansModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="slider-container">
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <div class="slider" id="imageSlider">
            </div>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
    </div>

    <script>
        function checkOrientation() {
            const overlay = document.getElementById("rotateOverlay");

            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            const isLandscape = window.innerWidth > window.innerHeight;

            if (isMobile && isLandscape) {
                // ❌ Block landscape
                overlay.style.display = "flex";
            } else {
                // ✅ Allow portrait
                overlay.style.display = "none";
            }
        }

        window.addEventListener("load", checkOrientation);
        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);

        // Audio toggle
        function toggleAudio() {
            const audio = document.getElementById("background-audio");
            const audioBtn = document.getElementById("audioBtn");

            if (audio.muted) {
                audio.muted = false;
                audio.play();
                audioBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            } else {
                audio.muted = true;
                audio.pause();
                audioBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            }
        }

        // Day/Night toggle
        window.onload = function () {
            const toggle = document.getElementById("toggleTheme");
            const themeLabel = document.getElementById("themeLabel");

            // Default = NIGHT
            toggle.checked = true;
            themeLabel.textContent = "NIGHT";
            document.body.classList.add("night-active");

            toggle.addEventListener("change", () => {
                if (toggle.checked) {
                    // NIGHT
                    document.body.classList.add("night-active");
                    themeLabel.textContent = "NIGHT";
                } else {
                    // DAY
                    document.body.classList.remove("night-active");
                    themeLabel.textContent = "DAY";
                }
            });
        };

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Floor plans modal & slider logic
        const floorPlansModal = document.getElementById("floorPlansModal");
        const imageSlider = document.getElementById("imageSlider");
        let slideIndex = 1;

        // Array of 9 image paths. Replace with your actual image paths.
        const floorPlanImages = [
            './assets/floor-plans/1st-floor.jpg',
            './assets/floor-plans/8th-&-15th-floor-refuge.jpg',
            './assets/floor-plans/22nd-floor-refuge.jpg',
            './assets/floor-plans/ground-floor.jpg',
            './assets/floor-plans/terrace-floor.jpg',
            './assets/floor-plans/typical-floor.jpg',
        ];

        // Function to create and inject image elements
        function createImages() {
            floorPlanImages.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('slider-image');
                imageSlider.appendChild(img);
            });
        }
        createImages();

        function openModal() {
            floorPlansModal.style.display = "flex";
            showSlides(slideIndex);
        }

        function closeModal() {
            floorPlansModal.style.display = "none";
        }

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function showSlides(n) {
            let i;
            const slides = document.getElementsByClassName("slider-image");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[slideIndex - 1].style.display = "block";
        }

        // Close modal if user clicks outside of the content
        window.addEventListener('click', function (event) {
            if (event.target == floorPlansModal) {
                closeModal();
            }
        });

        // Close modal on escape key
        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape" || event.key === "Esc") {
                closeModal();
            }
        });

        function showSlides(n) {
            const slides = document.getElementsByClassName("slider-image");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            // Displaying the block triggers the 'slideFade' animation defined in CSS
            slides[slideIndex - 1].style.display = "block";
        }

        setInterval(checkOrientation, 500);
    </script>
